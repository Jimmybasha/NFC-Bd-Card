<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <link rel="icon" type="image/png" href="images/logo.jpg">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="icon" sizes="192x192" href="images/logo.png">
    <link rel="icon" sizes="512x512" href="images/logo.png">
    <meta name="theme-color"
        content="#050505">

    <meta name="description"
        content="Happy Birthday Janna">

    <!-- Google Fonts -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="style.css">

</head>

<body>

    <!-- LOADER -->

    <div id="loader">

        <div class="loader-heart">

            ❤️

        </div>

        <h2>

            Preparing Something Beautiful...

        </h2>

    </div>

    <!-- BACKGROUND -->

    <div id="background">

        <div class="aurora"></div>

        <div class="stars"></div>

        <div class="particles"></div>

    </div>

    <!-- NAV -->

    <nav>

        <div class="logo">

            ❤️

        </div>

        <button id="musicToggle">

            <i class="fa-solid fa-music"></i>

        </button>

    </nav>

    <!-- HERO -->

    <section id="hero">

        <img
            id="heroImage"
            src="images/hero.jpg"
            alt="Hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <p class="top-text">

                Happy Birthday

            </p>

            <h1 id="heroTitle">

                Janna ❤️

            </h1>

            <p id="heroSubtitle">

                Every memory with you is my favorite.

            </p>

            <button id="startButton">

                Begin Your Surprise

            </button>

        </div>

    </section>

    <!-- STORY -->

    <section id="story">

        <div class="glass">

            <h2>

                Our Story

            </h2>

            <p id="storyContent"></p>

        </div>

    </section>

    <!-- TIMELINE -->

    <section id="timeline">

        <h2>

            Our Journey

        </h2>

        <div id="timelineContainer"></div>

    </section>

    <!-- GALLERY -->

    <section id="gallery">

        <h2>

            Our Memories

        </h2>

        <div id="galleryContainer"></div>

    </section>

    <!-- LETTER -->

    <section id="letterSection">

        <div class="envelope">

            <div class="letter-paper">

                <h2>

                    To My Beautiful Janna ❤️

                </h2>

                <p id="letterText"></p>

            </div>

        </div>

    </section>

    <!-- MUSIC -->

    <section id="musicSection">

        <div class="music-card">

            <img
                id="albumArt"
                src="images/hero.jpg"
                alt="Album">

            <div>

                <h3 id="songTitle">

                    Our Song

                </h3>

                <p id="songArtist">

                    Always Playing For You

                </p>

                <div class="progress">

                    <div id="progressBar"></div>

                </div>

            </div>

        </div>

    </section>

    <!-- BIRTHDAY WISHES -->

    <section id="wishes">

        <div id="wishContainer"></div>

    </section>

    <!-- ENDING -->

    <section id="ending">

        <h1>

            Happy Birthday

        </h1>

        <h2>

            Janna ❤️

        </h2>

        <p id="endingMessage">

        </p>

        <button id="giftButton">

            🎁 One Last Surprise

        </button>

    </section>

    <!-- SECRET -->

    <section id="secret">

        <div id="giftBox">

            🎁

        </div>

        <h2>

            Tap The Gift

        </h2>

    </section>

    <!-- HEARTS -->

    <div id="heartContainer"></div>

    <!-- CURSOR -->

    <div id="cursorGlow"></div>

    <!-- MUSIC -->

    <audio id="music" loop>

        <source
            src="music/song.mp3"
            type="audio/mpeg">

    </audio>

    <!-- GSAP -->

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>

    <!-- CONFIG -->

    <script src="config.js"></script>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
